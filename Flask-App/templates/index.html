<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daonna - Human-like Typing Simulator</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">Daonna</h1>
            <p class="app-subtitle">Human-like Typing Simulator</p>
        </header>
        
        <main class="app-content">
            <div class="card instructions-card">
                <div class="card-content">
                    <p>Paste text below, then click 'Start Typing'. You'll have 5 seconds to focus on your target application.</p>
                </div>
            </div>
            
            <div class="card input-card">
                <div class="card-content">
                    <textarea id="textInput" class="text-input" placeholder="Paste your text here..."></textarea>
                </div>
            </div>
            
            <div class="card settings-card">
                <div class="card-header">
                    <h2>Settings</h2>
                </div>
                <div class="card-content">
                    <div class="slider-container">
                        <label for="wpmSlider" class="slider-label">
                            Typing Speed (WPM): <span id="wpmValue">50</span>
                        </label>
                        <div class="slider-with-value">
                            <input type="range" id="wpmSlider" min="20" max="100" value="50" class="slider">
                        </div>
                    </div>
                    
                    <div class="slider-container">
                        <label for="randomnessSlider" class="slider-label">
                            Randomness: <span id="randomnessValue">0.5</span>
                        </label>
                        <div class="slider-with-value">
                            <input type="range" id="randomnessSlider" min="0.1" max="1.0" step="0.1" value="0.5" class="slider">
                        </div>
                    </div>
                    
                    <div class="slider-container">
                        <label for="typoSlider" class="slider-label">
                            Typo Probability: <span id="typoValue">0.02</span>
                        </label>
                        <div class="slider-with-value">
                            <input type="range" id="typoSlider" min="0" max="0.1" step="0.01" value="0.02" class="slider">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="button-container">
                <button id="startButton" class="btn primary-btn">
                    <i class="material-icons">keyboard</i> Start Typing
                </button>
                <button id="clearButton" class="btn secondary-btn">
                    <i class="material-icons">clear</i> Clear
                </button>
            </div>
            
            <div id="statusContainer" class="status-container">
                <div id="statusMessage" class="status-message"></div>
                <div id="progressBar" class="progress-bar-container">
                    <div class="progress-bar"></div>
                </div>
            </div>
        </main>
        
        <footer class="app-footer">
            <p>Daonna - Humanized Text Input Simulator</p>
        </footer>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
